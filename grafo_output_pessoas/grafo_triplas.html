                  nodes = new vis.DataSet([{"color": "#4fc3f7", "font": {"color": "#e6edf3"}, "id": "Alex Rossmiller", "label": "Alex Rossmiller", "shape": "dot", "size": 22.5, "title": "\u003cb\u003eAlex Rossmiller\u003c/b\u003e\u003cbr\u003eOcorrencias em triplas: 1\u003cbr\u003eConexoes: 1\u003cbr\u003eFonte: conexoes_pessoas.json"}, {"color": "#ffb74d", "font": {"color": "#e6edf3"}, "id": "Geoffrey S. Berman", "label": "Geoffrey S. Berman", "shape": "dot", "size": 33.0, "title": "\u003cb\u003eGeoffrey S. Berman\u003c/b\u003e\u003cbr\u003eOcorrencias em triplas: 2\u003cbr\u003eConexoes: 2\u003cbr\u003eFonte: conexoes_pessoas.json"}, {"color": "#ffb74d", "font": {"color": "#e6edf3"}, "id": "Epstein", "label": "Epstein", "shape": "dot", "size": 33.0, "title": "\u003cb\u003eEpstein\u003c/b\u003e\u003cbr\u003eOcorrencias em triplas: 2\u003cbr\u003eConexoes: 1\u003cbr\u003eFonte: conexoes_pessoas.json"}, {"color": "#ef5350", "font": {"color": "#e6edf3"}, "id": "Jeffrey Epstein", "label": "Jeffrey Epstein", "shape": "dot", "size": 54.0, "title": "\u003cb\u003eJeffrey Epstein\u003c/b\u003e\u003cbr\u003eOcorrencias em triplas: 4\u003cbr\u003eConexoes: 3\u003cbr\u003eFonte: conexoes_pessoas.json"}, {"color": "#4fc3f7", "font": {"color": "#e6edf3"}, "id": "Barbara Moses", "label": "Barbara Moses", "shape": "dot", "size": 22.5, "title": "\u003cb\u003eBarbara Moses\u003c/b\u003e\u003cbr\u003eOcorrencias em triplas: 1\u003cbr\u003eConexoes: 1\u003cbr\u003eFonte: conexoes_pessoas.json"}]);
                  edges = new vis.DataSet([{"arrows": "to", "color": {"color": "#30363d", "highlight": "#f78166"}, "font": {"color": "#c9d1d9", "size": 10, "strokeWidth": 3}, "from": "Alex Rossmiller", "label": "trabalhou com", "title": "\u003cb\u003eAlex Rossmiller\u003c/b\u003e -\u003e \u003cb\u003eGeoffrey S. Berman\u003c/b\u003e\u003cbr\u003eRelacao: trabalhou com\u003cbr\u003ePeso: 1", "to": "Geoffrey S. Berman", "width": 4.5}, {"arrows": "to", "color": {"color": "#30363d", "highlight": "#f78166"}, "font": {"color": "#c9d1d9", "size": 10, "strokeWidth": 3}, "from": "Geoffrey S. Berman", "label": "foi mencionado com", "title": "\u003cb\u003eGeoffrey S. Berman\u003c/b\u003e -\u003e \u003cb\u003eJeffrey Epstein\u003c/b\u003e\u003cbr\u003eRelacao: foi mencionado com\u003cbr\u003ePeso: 1", "to": "Jeffrey Epstein", "width": 4.5}, {"arrows": "to", "color": {"color": "#30363d", "highlight": "#f78166"}, "font": {"color": "#c9d1d9", "size": 10, "strokeWidth": 3}, "from": "Epstein", "label": "foi mencionado com, trabalhou com", "title": "\u003cb\u003eEpstein\u003c/b\u003e -\u003e \u003cb\u003eJeffrey Epstein\u003c/b\u003e\u003cbr\u003eRelacao: foi mencionado com; trabalhou com\u003cbr\u003ePeso: 2", "to": "Jeffrey Epstein", "width": 8.0}, {"arrows": "to", "color": {"color": "#30363d", "highlight": "#f78166"}, "font": {"color": "#c9d1d9", "size": 10, "strokeWidth": 3}, "from": "Barbara Moses", "label": "foi mencionado com", "title": "\u003cb\u003eBarbara Moses\u003c/b\u003e -\u003e \u003cb\u003eJeffrey Epstein\u003c/b\u003e\u003cbr\u003eRelacao: foi mencionado com\u003cbr\u003ePeso: 1", "to": "Jeffrey Epstein", "width": 4.5}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {
    "configure": {

        "filter": [

    },
    "edges": {

            "inherit": true
        },
        "smooth": {
            "enabled": true,

    "interaction": {

        "hideEdgesOnDrag": false,
        "hideNodesOnDrag": false
    },
    "physics": {
        "barnesHut": {

            "centralGravity": 0.22,
            "damping": 0.09,
            "gravitationalConstant": -6500,
            "springConstant": 0.035,

        },
        "enabled": true,
        "stabilization": {
            "enabled": true,
            "fit": true,
            "iterations": 1000,
            "onlyDynamicEdges": false,
            "updateInterval": 50
        }
    }
};

                  options.configure["container"] = document.getElementById("config");
                  

                  network = new vis.Network(container, data, options);

                  

                  

                  


                  

                  return network;

              }
